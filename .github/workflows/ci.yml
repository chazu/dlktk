name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...

  # Dogfood: the shipped example dialectics must import cleanly and their
  # recorded decisions must still be justified (no drift, no invariant
  # violations). `check` exits 5 on findings, failing the job.
  dialectics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build -o dlktk ./cmd/dlktk
      - run: |
          for f in examples/*.ndjson; do
            ./dlktk import "$f" --store /tmp/dialectics
          done
          ./dlktk check --all --strict --store /tmp/dialectics
      # The reference deliberation harness must run end to end (AGENTS.md).
      - run: DLKTK=$PWD/dlktk ./examples/deliberate.sh
